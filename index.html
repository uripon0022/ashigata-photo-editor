<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0e766a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="足形エディタ">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>足形写真エディタ</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="panel tools-panel" aria-label="編集ツール">
        <div class="brand">
          <div>
            <h1>足形写真エディタ</h1>
            <p>背景透過、選択、色変更</p>
          </div>
          <button id="resetButton" class="icon-button" type="button" title="最初から">
            <span aria-hidden="true">↺</span>
            <span class="sr-only">最初から</span>
          </button>
        </div>

        <label class="file-picker">
          <input id="imageInput" type="file" accept="image/*">
          <span>画像を読み込む</span>
        </label>

        <div class="tool-group">
          <h2>ツール</h2>
          <div class="segmented" role="radiogroup" aria-label="ツール">
            <button class="tool-button active" data-tool="brush" type="button" title="選択ブラシ">選択</button>
            <button class="tool-button" data-tool="magic" type="button" title="タップ選択">タップ</button>
            <button class="tool-button" data-tool="rect" type="button" title="四角選択">四角</button>
            <button class="tool-button" data-tool="eraser" type="button" title="消しゴム">消す</button>
            <button class="tool-button" data-tool="restore" type="button" title="復元ブラシ">戻す</button>
            <button class="tool-button" data-tool="pan" type="button" title="移動">移動</button>
          </div>
        </div>

        <div class="tool-group">
          <h2>選択範囲</h2>
          <div class="button-grid">
            <button id="selectVisibleButton" type="button">透明以外を選択</button>
            <button id="selectBackgroundButton" type="button">背景を選択</button>
            <button id="removeBackgroundButton" type="button">背景を透明</button>
            <button id="invertSelectionButton" type="button">反転</button>
            <button id="clearSelectionButton" type="button">解除</button>
            <button id="deleteSelectionButton" type="button">透明にする</button>
            <button id="keepSelectionButton" type="button">選択だけ残す</button>
          </div>
        </div>

        <div class="tool-group">
          <h2>調整</h2>
          <label>
            ブラシ
            <input id="brushSize" type="range" min="4" max="120" value="34">
          </label>
          <label>
            背景の近さ
            <input id="tolerance" type="range" min="5" max="180" value="52">
          </label>
          <label>
            ふちを柔らかく
            <input id="feather" type="range" min="0" max="8" value="1">
          </label>
        </div>
      </aside>

      <section class="workspace" aria-label="画像編集エリア">
        <div class="topbar">
          <div class="status">
            <strong id="statusTitle">画像を読み込んでください</strong>
            <span id="statusDetail">足形スタンプや足裏写真をここで加工できます</span>
          </div>
          <div class="top-actions">
            <div class="view-switch" aria-label="表示モード">
              <button class="view-button active" data-view="edited" type="button">編集</button>
              <button class="view-button" data-view="original" type="button">元画像</button>
              <button class="view-button" data-view="compare" type="button">比較</button>
            </div>
            <button id="rotateLeftButton" class="angle-button" type="button" title="左に90度回転">
              <span aria-hidden="true">⟲</span>
              <span>左90°</span>
            </button>
            <button id="rotateRightButton" class="angle-button" type="button" title="右に90度回転">
              <span aria-hidden="true">⟳</span>
              <span>右90°</span>
            </button>
            <button id="undoButton" class="icon-button" type="button" title="戻る">↶</button>
            <button id="redoButton" class="icon-button" type="button" title="進む">↷</button>
            <button id="previewBgButton" type="button">白背景表示</button>
            <button id="downloadButton" type="button">PNG保存</button>
          </div>
        </div>

        <div class="canvas-stage" id="stage">
          <canvas id="editorCanvas" width="1200" height="800"></canvas>
          <canvas id="overlayCanvas" width="1200" height="800"></canvas>
          <div id="emptyState" class="empty-state">
            <strong>画像を読み込む</strong>
            <span>背景透過したい足形・足裏写真を選んでください</span>
          </div>
        </div>
      </section>

      <aside class="panel color-panel" aria-label="色変更">
        <div class="tool-group">
          <h2>色を変更</h2>
          <div class="color-preview">
            <div id="colorSwatch" aria-hidden="true"></div>
            <input id="hexColor" type="text" value="#5a2f1f" maxlength="7" aria-label="HEXカラー">
          </div>
          <canvas id="colorMap" class="color-map" width="260" height="180" aria-label="色グラフ"></canvas>
          <input id="hueSlider" type="range" min="0" max="360" value="18" aria-label="色相">
          <div class="number-grid">
            <label>R<input id="redInput" type="number" min="0" max="255" value="90"></label>
            <label>G<input id="greenInput" type="number" min="0" max="255" value="47"></label>
            <label>B<input id="blueInput" type="number" min="0" max="255" value="31"></label>
          </div>
          <div class="saved-color-bar">
            <h3>保存色</h3>
            <button id="saveColorButton" class="mini-button" type="button" title="現在の色を保存">保存</button>
          </div>
          <div id="savedColors" class="saved-colors" aria-label="保存色"></div>
          <label class="check-row">
            <input id="selectedOnly" type="checkbox" checked>
            選択範囲だけ
          </label>
          <label class="check-row">
            <input id="keepAlpha" type="checkbox" checked>
            透明度を保つ
          </label>
          <label class="check-row">
            <input id="preserveTexture" type="checkbox" checked>
            かすれを残す
          </label>
          <label class="check-row">
            <input id="cleanWhite" type="checkbox" checked>
            白い部分を抜く
          </label>
          <label>
            かすれの強さ
            <input id="textureStrength" type="range" min="0" max="100" value="88">
          </label>
          <label>
            白の判定
            <input id="whiteCutoff" type="range" min="2" max="45" value="18">
          </label>
          <button id="applyColorButton" class="primary" type="button">指定色に変更</button>
        </div>

        <div class="tool-group">
          <h2>書き出し</h2>
          <div class="info-list">
            <span>PNGは透明背景を保持します</span>
            <span>色は指定色に揃え、かすれだけ元写真から残します</span>
          </div>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
